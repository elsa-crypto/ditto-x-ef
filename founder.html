<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Founder Application | Ditto × EF</title>
  <meta name="description" content="Apply as a founder to be matched with an Entrepreneur First investor." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grain" aria-hidden="true"></div>

  <main class="wrap">
    <a class="back-link" href="index.html">&larr; Back</a>

    <header class="hero" style="margin-bottom: 22px;">
      <p class="eyebrow">Founder application</p>
      <h1 class="headline" style="font-size: clamp(24px, 6vw, 30px);">Tell us what you're building</h1>
      <p class="subtitle">A few honest sentences beat a polished pitch. Takes about 5 minutes.</p>
    </header>

    <section class="card" aria-labelledby="apply-heading">
      <h2 id="apply-heading" class="card-title hidden">Founder application</h2>

      <form id="apply-form" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE" />
        <input type="hidden" name="subject" value="New Ditto x EF founder application" />
        <input type="hidden" name="from_name" value="Ditto x EF" />
        <input type="checkbox" name="botcheck" class="hidden" style="display:none" tabindex="-1" autocomplete="off" />

        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" required placeholder="Jane Doe" autocomplete="name" />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="jane@example.com" autocomplete="email" />
        </div>

        <div class="field">
          <label for="building">What are you building? <span class="hint">(one line)</span></label>
          <input type="text" id="building" name="building" required placeholder="e.g. AI copilot for freight brokers" />
        </div>

        <div class="field">
          <label for="problem">What problem are you solving, and why is now the right time?</label>
          <textarea id="problem" name="problem" rows="4" required placeholder="The insight, the pain point, why it's urgent."></textarea>
        </div>

        <div class="field">
          <label for="unique">Why you? What's your unique insight or unfair advantage here?</label>
          <textarea id="unique" name="unique" rows="3" required placeholder="Domain expertise, past experience, something you know that others don't."></textarea>
        </div>

        <fieldset class="field">
          <legend>Stage</legend>
          <div class="segmented cols-3" role="radiogroup">
            <label class="seg">
              <input type="radio" name="stage" value="Idea only" required />
              <span>Idea only</span>
            </label>
            <label class="seg">
              <input type="radio" name="stage" value="Building" />
              <span>Building</span>
            </label>
            <label class="seg">
              <input type="radio" name="stage" value="Live / have users" />
              <span>Live / users</span>
            </label>
          </div>
        </fieldset>

        <fieldset class="field">
          <legend>Team</legend>
          <div class="segmented cols-3" role="radiogroup">
            <label class="seg">
              <input type="radio" name="team" value="Solo" required />
              <span>Solo</span>
            </label>
            <label class="seg">
              <input type="radio" name="team" value="Have co-founder(s)" />
              <span>Have co-founder(s)</span>
            </label>
            <label class="seg">
              <input type="radio" name="team" value="Looking for a co-founder" />
              <span>Looking for one</span>
            </label>
          </div>
        </fieldset>

        <div class="field-row">
          <div class="field">
            <label for="linkedin">LinkedIn</label>
            <input type="url" id="linkedin" name="linkedin" required placeholder="https://linkedin.com/in/you" />
          </div>
          <div class="field">
            <label for="link">Deck or site <span class="hint">(optional)</span></label>
            <input type="url" id="link" name="link" placeholder="https://" />
          </div>
        </div>

        <div class="field">
          <label for="looking_for">What are you looking for in an investor?</label>
          <textarea id="looking_for" name="looking_for" rows="3" required placeholder="Capital, intros, specific expertise, hands-on help..."></textarea>
        </div>

        <div class="field">
          <label for="other">Anything else we should know? <span class="hint">(optional)</span></label>
          <textarea id="other" name="other" rows="2" placeholder=""></textarea>
        </div>

        <button type="submit" class="submit" id="submit-btn">Submit application</button>
      </form>
      <p class="form-note" id="form-note" role="status" aria-live="polite"></p>
    </section>

    <footer class="footer">
      <span>© <span id="year"></span> Ditto</span>
      <span>Ditto × Entrepreneur First</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
